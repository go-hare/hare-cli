name: Release Hare CLI

on:
  push:
    tags:
      - "v*"

jobs:
  build-binaries:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            asset_name: hare-cli-linux-x64
          - os: ubuntu-latest
            target: linux-x64-baseline
            asset_name: hare-cli-linux-x64-baseline
          - os: ubuntu-24.04-arm
            target: linux-arm64
            asset_name: hare-cli-linux-arm64
          - os: macos-15-intel
            target: darwin-x64
            asset_name: hare-cli-darwin-x64
          - os: macos-14
            target: darwin-arm64
            asset_name: hare-cli-darwin-arm64
          - os: windows-latest
            target: windows-x64
            asset_name: hare-cli-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: ../hare-code

      - name: Build CLI binary
        run: node scripts/build-release.mjs --target ${{ matrix.target }}
        working-directory: .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/release/${{ matrix.asset_name }}
          if-no-files-found: error

  build-tgz:
    name: Build npm tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: ../hare-code

      - name: Build CLI JS bundle
        run: node scripts/build-cli.mjs

      - name: Pack npm tarball
        run: npm pack

      - uses: actions/upload-artifact@v4
        with:
          name: npm-tgz
          path: "*.tgz"
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-binaries
      - build-tgz
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f -maxdepth 2 -exec cp {} release/ \;
          ls -la release

      - name: Create checksums
        run: |
          set -euo pipefail
          cd release
          sha256sum * > hare-cli-checksums.txt
          cat hare-cli-checksums.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/hare-cli-linux-x64
            release/hare-cli-linux-x64-baseline
            release/hare-cli-linux-arm64
            release/hare-cli-darwin-x64
            release/hare-cli-darwin-arm64
            release/hare-cli-windows-x64.exe
            release/*.tgz
            release/hare-cli-checksums.txt
